name: hadirpro
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.0

dependencies:
  device_preview: ^1.2.0
  flex_color_scheme: ^8.0.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.16
  freezed_annotation: ^2.4.4
  go_router: ^14.6.2
  json_annotation: ^4.9.0
  pinput: ^5.0.0
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.3.3
  supabase_flutter: ^2.8.1

dev_dependencies:
  build_runner: ^2.4.13
  custom_lint: ^0.7.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/png/
    - assets/svg/
    - .env

flutter_intl:
  enabled: true
  arb_dir: lib/features/shared/localization/l10n
  output_dir: lib/features/shared/localization/generated
